<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Data Sprint — Vidyalankar Polytechnic × Siemens</title>
<meta name="description" content="Data Sprint — an inauguration event by Vidyalankar Polytechnic in collaboration with Siemens.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app" data-screen="orbit">

  <!-- shared ambient background -->
  <div class="bg-field" aria-hidden="true"></div>

  <!-- ================= SCREEN 1 — ORBIT ================= -->
  <section id="screen-orbit" class="screen is-active" aria-label="Data Sprint introduction">

    <div class="corner-logo corner-logo--left" style="--box-w: 200px;">
      <img src="assets/images/logo-left-placeholder.svg" alt="College logo" draggable="false">
    </div>

    <div class="corner-logo corner-logo--right" style="--box-w: 200px;">
      <img src="assets/images/logo-right-placeholder.svg" alt="Siemens logo" draggable="false">
    </div>

    <div class="orbit-stage">
      <div class="orbit-track" aria-hidden="true"></div>

      <div id="orbit-items" class="orbit-items">
        <div class="orbit-item" data-index="0"><img src="assets/images/orbit-01-rapidminer-x.png" alt="Siemens RapidMiner X" draggable="false"></div>
        <div class="orbit-item" data-index="1"><img src="assets/images/orbit-02-insights-hub.png" alt="Siemens Insights Hub" draggable="false"></div>
        <div class="orbit-item" data-index="2"><img src="assets/images/orbit-03-data-analytics.png" alt="Data Analytics" draggable="false"></div>
        <div class="orbit-item" data-index="3"><img src="assets/images/orbit-04-data-mining.png" alt="Data Mining" draggable="false"></div>
        <div class="orbit-item" data-index="4"><img src="assets/images/orbit-05-data-prediction.png" alt="Data Prediction" draggable="false"></div>
        <div class="orbit-item" data-index="5"><img src="assets/images/orbit-06-data-efficiency.png" alt="Data Efficiency" draggable="false"></div>
        <div class="orbit-item" data-index="6"><img src="assets/images/orbit-07-machine-learning.png" alt="Machine Learning" draggable="false"></div>
        <div class="orbit-item" data-index="7"><img src="assets/images/orbit-08-industrial-ai.png" alt="Siemens Industrial AI" draggable="false"></div>
      </div>

      <div id="trail-layer" class="trail-layer" aria-hidden="true"></div>

      <button id="core-button" class="core-button" type="button" aria-label="Begin the Data Sprint sequence">
        <span class="core-button__ring core-button__ring--outer"></span>
        <span class="core-button__ring core-button__ring--inner"></span>
        <span class="core-button__dot"></span>
      </button>
    </div>

    <p class="hint-text">tap the core to begin</p>
  </section>

  <!-- ================= SCREEN 2 — DATA SPRINT BUTTON ================= -->
  <section id="screen-button" class="screen" aria-label="Data Sprint">

    <div class="final-banner" style="--box-w: 300px;">
      <img src="assets/images/final-banner-placeholder.svg" alt="Event lockup" draggable="false">
    </div>

    <button id="datasprint-button" class="ds-button" type="button">
      <span class="ds-button__ring"></span>
      <span class="ds-button__ring ds-button__ring--inner"></span>
      <span class="ds-button__label" data-text="Data Sprint">Data Sprint</span>
    </button>

    <p class="hint-text">tap to register</p>
  </section>

  <!-- ================= SCREEN 3 — REGISTER ================= -->
  <section id="screen-register" class="screen" aria-label="Registration">
    <p class="register-eyebrow">Data Sprint &middot; Vidyalankar Polytechnic × Siemens</p>
    <h1 class="register-title">Register Now</h1>

    <div class="qr-panel">
      <span class="qr-panel__corner qr-panel__corner--tl"></span>
      <span class="qr-panel__corner qr-panel__corner--tr"></span>
      <span class="qr-panel__corner qr-panel__corner--bl"></span>
      <span class="qr-panel__corner qr-panel__corner--br"></span>
      <img src="assets/images/qr-placeholder.svg" alt="Registration QR code" id="qr-img" draggable="false">
    </div>

    <p class="register-sub">Scan to secure your spot</p>
  </section>

  <!-- ================= shared plasma transition overlay ================= -->
  <div id="plasma-overlay" class="plasma-overlay" aria-hidden="true">
    <svg width="0" height="0" style="position:absolute">
      <filter id="plasma-turbulence" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.014 0.022" numOctaves="2" seed="7" result="noise">
          <animate attributeName="baseFrequency" dur="7s" values="0.014 0.022;0.02 0.03;0.014 0.022" repeatCount="indefinite"/>
        </feTurbulence>
        <feColorMatrix in="noise" type="matrix"
          values="0 0 0 0 0.31
                  0 0 0 0 0.84
                  0 0 0 0 1
                  0 0 0 0.85 0" result="tint"/>
        <feComposite operator="in" in="tint" in2="SourceGraphic"/>
      </filter>
    </svg>
    <div class="plasma-core"></div>
  </div>

  <button id="mute-toggle" class="mute-toggle" type="button" aria-pressed="false" aria-label="Mute sound">
    <svg viewBox="0 0 24 24" class="icon-sound" aria-hidden="true">
      <path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor"/>
      <path class="icon-sound__wave" d="M16.5 8.5a5 5 0 0 1 0 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <path class="icon-sound__wave" d="M19 6a9 9 0 0 1 0 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <line class="icon-sound__mute" x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </button>

</div>

<script src="script.js"></script>
</body>
</html>
